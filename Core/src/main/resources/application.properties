spring.application.name=database-keshe
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.pool-name=${DB_POOL_NAME:database-keshe-hikari}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:4}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:16}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_MS:120000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.connection-test-query=${DB_POOL_TEST_QUERY:SELECT 1 FROM DUAL}
spring.datasource.hikari.connection-init-sql=ALTER SESSION SET TIME_ZONE = '${APP_TIME_DATABASE_ZONE:Asia/Shanghai}'
app.log.dir=${APP_LOG_DIR:logs}
app.time.application-zone=${APP_TIME_APPLICATION_ZONE:Asia/Shanghai}
app.time.database-zone=${APP_TIME_DATABASE_ZONE:Asia/Shanghai}
mybatis.configuration.map-underscore-to-camel-case=true

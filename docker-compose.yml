services:
  oracle21c:
    image: gvenzl/oracle-xe:21
    container_name: oracle21c
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:?ORACLE_PASSWORD is required in .env}
      - APP_USER=${DB_USERNAME:?DB_USERNAME is required in .env}
      - APP_USER_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required in .env}
      - TZ=Asia/Shanghai
      - ORA_SDTZ=Asia/Shanghai
    volumes:
      # Oracle 21c XE data files. Use a named volume to avoid Windows bind-mount issues.
      - psm_oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: no

volumes:
  psm_oracle_data:
    driver: local
